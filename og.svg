  <text x="600" y="285" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800"
        letter-spacing="-2" fill="#0B2F39" text-anchor="middle">From your library to</text>
  <text x="600" y="370" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800"
        letter-spacing="-2" fill="#114D5D" text-anchor="middle">everyday content.</text>

  <rect x="540" y="410" width="120" height="2" rx="1" fill="url(#rule)"/>

  <text x="600" y="465" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400"
        fill="#4B5563" text-anchor="middle">Upload an article, sermon, or book chapter, and turn it into</text>
  <text x="600" y="498" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400"
        fill="#4B5563" text-anchor="middle">Q&amp;A, articles, key quotes, or social posts.</text>

  <line x1="80" y1="560" x2="1120" y2="560" stroke="#E5E7EB" stroke-width="1"/>

  <rect x="80" y="572" width="56" height="32" rx="6" fill="#114D5D"/>
  <text x="108" y="594" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800"
        letter-spacing="1" fill="#FFFFFF" text-anchor="middle">CBM</text>
  <text x="150" y="595" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700"
        letter-spacing="0" fill="#1F2937">Center for Biblical Missions</text>

  <text x="1120" y="595" font-family="'DM Mono', monospace" font-size="13" font-weight="500"
